<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lite Experience | The Digital RSVP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap');

        :root {
            --primary: #4A4A4A;      
            --accent: #fec89a;       
            --bg: #FCD5CE;           
            --card-bg: #FFFFFF;
            --border: #ece4db;      
            --text-dark: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: var(--primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Global Navigation Header --- */
        .main-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 40px;
            z-index: 10;
        }

        .logo-wrap {
            display: inline-block;
            text-decoration: none;
        }

        .nav-logo-img {
            height: 45px;
            width: auto;
            display: block;
        }

        /* --- Elegant Hero Header --- */
        .order-header {
            text-align: center;
            padding: 140px 24px 50px; /* Shifted down to give the upper-left logo room */
            background-color: var(--bg); 
            border-bottom: 1px solid var(--border);
        }

        .order-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .price-tag {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 0.5px;
        }

        /* --- Split Layout Layout --- */
        .order-container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 60px;
            align-items: flex-start;
        }

        /* --- Left Side: Content Perks --- */
        .package-summary h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .package-summary p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .inclusion-list {
            list-style: none;
        }

        .inclusion-list li {
            font-size: 1rem;
            color: #444;
            margin-bottom: 16px;
            position: relative;
            padding-left: 30px;
        }

        .inclusion-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #d4a5a5;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* --- Right Side: Form Block --- */
        .form-card {
            background-color: #fafaf8;
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .form-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--text-dark);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: #ffffff;
            color: var(--text-dark);
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #d4a5a5;
        }

        .form-group select {
            background-color: #f0ede6;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--text-dark);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #d4a5a5;
        }

        /* --- Mobile Layout Scaling --- */
        @media (max-width: 850px) {
            .main-nav { padding: 20px; }
            .nav-logo-img { height: 35px; }
            .order-header { padding: 110px 24px 40px; }
            .order-header h1 { font-size: 2.2rem; }
            .order-container { grid-template-columns: 1fr; gap: 40px; margin: 40px auto; }
            .form-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <a href="index.html" class="logo-wrap">
            <img src="logo.png" alt="TDR Logo" class="nav-logo-img">
        </a>
    </nav>

    <header class="order-header">
        <h1>The "Lite" Experience</h1>
        <div class="price-tag">₱1
